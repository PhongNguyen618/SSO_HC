services:
  web:
    build: .
    image: sso_hc_web:latest
    ports:
      - "8000:8000"

    # Tải toàn bộ biến từ file .env vào container
    # Các biến: STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET,
    #            STRAVA_CLUB_ID, DEFAULT_ADMIN_USER, DEFAULT_ADMIN_PASSWORD,
    #            STRAVA_WEBHOOK_VERIFY_TOKEN, APP_URL
    env_file:
      - .env

    # Override DATABASE_URL: .env dùng đường dẫn local (sqlite:///./SSO_HC.db)
    # Docker cần đường dẫn tuyệt đối trong container tương ứng volume mount bên dưới
    environment:
      - DATABASE_URL=sqlite:////app/SSO_HC.db

    volumes:
      # Mount DB từ thư mục gốc của host vào container (dữ liệu không mất khi rebuild)
      - ./SSO_HC.db:/app/SSO_HC.db
      # Mount thư mục uploads để giữ ảnh đã upload khi rebuild
      - ./static/uploads:/app/static/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped