services:
  web:
    build: .
    image: sso_hc_web:latest
    ports:
      - "8000:8000"

    # Tải toàn bộ biến từ file .env vào container
    # Các biến: DATABASE_URL, STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET,
    #            STRAVA_CLUB_ID, DEFAULT_ADMIN_USER, DEFAULT_ADMIN_PASSWORD,
    #            STRAVA_WEBHOOK_VERIFY_TOKEN
    env_file:
      - .env

    volumes:
      # Mount DB từ thư mục gốc của host vào container (dữ liệu không mất khi rebuild)
      - ./SSO_HC.db:/app/SSO_HC.db
      # Mount thư mục uploads để giữ ảnh đã upload khi rebuild
      - ./static/uploads:/app/static/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped